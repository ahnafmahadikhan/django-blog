<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-100 via-pink-50 to-orange-100 py-10 px-4">

    <div class="max-w-2xl mx-auto">
        <p class="text-xs font-semibold uppercase tracking-widest text-violet-400 mb-1">Blog</p>
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-violet-600 to-pink-600 mb-6">Create new post</h1>

        <form method="POST" class="bg-white border-2 border-violet-200 rounded-2xl p-8 shadow-lg shadow-violet-100">
            {% csrf_token %}

            <div class="mb-5">
                <label for="title" class="block text-sm font-semibold text-violet-500 mb-1.5">Title</label>
                <input
                    type="text"
                    id="title"
                    name="title"
                    placeholder="Enter a title…"
                    class="w-full border-2 border-violet-100 rounded-xl px-4 py-2.5 text-sm text-gray-800 placeholder-violet-300 focus:outline-none focus:ring-2 focus:ring-violet-400 focus:border-transparent transition bg-violet-50"
                >
            </div>

            <div class="mb-5">
                <label for="content" class="block text-sm font-semibold text-pink-500 mb-1.5">Content</label>
                <textarea
                    id="content"
                    name="content"
                    rows="6"
                    placeholder="Write your post content here…"
                    class="w-full border-2 border-pink-100 rounded-xl px-4 py-2.5 text-sm text-gray-800 placeholder-pink-300 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-transparent transition resize-y bg-pink-50"
                ></textarea>
                <p class="text-xs text-pink-300 mt-1">✨ Markdown is supported.</p>
            </div>

            <div class="flex items-center justify-between pt-5 border-t-2 border-violet-100 mt-6">
                <a href="#" class="text-sm font-medium text-gray-400 border-2 border-gray-200 rounded-xl px-4 py-2 hover:bg-gray-50 transition">
                    Cancel
                </a>
                <button
                    type="submit"
                    class="inline-flex items-center gap-2 text-sm font-semibold text-white bg-gradient-to-r from-violet-500 to-pink-500 px-6 py-2.5 rounded-xl hover:from-violet-600 hover:to-pink-600 transition shadow-md shadow-violet-200"
                >
                    🚀 Create post
                </button>
            </div>
        </form>

        <p class="text-xs text-violet-300 text-right mt-2">🔒 CSRF protected</p>
    </div>

</body>
</html>
