<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-100 via-pink-50 to-orange-100 py-10 px-4">

    <div class="max-w-2xl mx-auto">

        <div class="mb-8">
            <p class="text-xs font-semibold uppercase tracking-widest text-violet-400 mb-1">Welcome to</p>
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-violet-600 to-pink-600">My Blog</h1>
        </div>

        {% if user.is_authenticated %}

            <div class="bg-white border-2 border-violet-200 rounded-2xl px-6 py-4 shadow-md shadow-violet-100 flex items-center justify-between mb-8">
                <p class="text-sm font-semibold text-violet-500">👋 Welcome, <span class="text-gray-800">{{ user.username }}</span></p>
                <div class="flex gap-2">
                    <a href="/create/" class="text-sm font-semibold text-white bg-gradient-to-r from-violet-500 to-pink-500 px-4 py-2 rounded-xl hover:from-violet-600 hover:to-pink-600 transition shadow shadow-violet-200">
                        ✏️ New post
                    </a>
                    <a href="/logout/" class="text-sm font-medium text-gray-400 border-2 border-gray-200 rounded-xl px-4 py-2 hover:bg-gray-50 transition">
                        Logout
                    </a>
                </div>
            </div>

        {% else %}

            <div class="bg-white border-2 border-violet-200 rounded-2xl px-6 py-4 shadow-md shadow-violet-100 flex items-center gap-3 mb-8">
                <a href="/login/" class="text-sm font-semibold text-white bg-gradient-to-r from-violet-500 to-pink-500 px-5 py-2 rounded-xl hover:from-violet-600 hover:to-pink-600 transition shadow shadow-violet-200">
                    Login
                </a>
                <a href="/signup/" class="text-sm font-medium text-violet-500 border-2 border-violet-200 rounded-xl px-5 py-2 hover:bg-violet-50 transition">
                    Sign up
                </a>
            </div>

        {% endif %}

        <div class="space-y-4">
            {% for post in posts %}
            <div class="bg-white border-2 border-violet-100 rounded-2xl p-6 shadow shadow-violet-50 hover:border-pink-200 hover:shadow-pink-100 transition">
                <h2 class="text-lg font-bold mb-2">
                    <a href="/post/{{ post.id }}/"
                       class="text-transparent bg-clip-text bg-gradient-to-r from-violet-600 to-pink-600 hover:from-violet-800 hover:to-pink-800 transition">
                        {{ post.title }}
                    </a>
                </h2>
                <p class="text-sm text-gray-500 leading-relaxed">{{ post.content }}</p>
            </div>
            {% endfor %}
        </div>

    </div>

</body>
</html>
