<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-100 via-pink-50 to-orange-100 py-12 px-4">

    <div class="max-w-2xl mx-auto">

        <article class="bg-white border-2 border-violet-200 rounded-2xl p-8 shadow-lg shadow-violet-100">

            <div class="inline-block bg-gradient-to-r from-violet-500 to-pink-500 text-white text-xs font-semibold px-3 py-1 rounded-full mb-4 tracking-wide uppercase">
                Post
            </div>

            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-violet-600 to-pink-600 mb-5 leading-tight">
                {{ post.title }}
            </h1>

            <div class="h-1 w-16 rounded-full bg-gradient-to-r from-violet-400 to-pink-400 mb-6"></div>

            <p class="text-gray-600 text-base leading-relaxed">{{ post.content }}</p>

        </article>

        {% if request.user == post.author %}
        <div class="flex items-center gap-3 mt-5">

            <a href="/edit/{{ post.id }}/"
               class="inline-flex items-center gap-2 text-sm font-medium text-white bg-gradient-to-r from-violet-500 to-purple-500 rounded-xl px-5 py-2.5 hover:from-violet-600 hover:to-purple-600 transition shadow-md shadow-violet-200">
                ✏️ Edit
            </a>

            <a href="/delete/{{ post.id }}/"
               class="inline-flex items-center gap-2 text-sm font-medium text-white bg-gradient-to-r from-pink-500 to-red-500 rounded-xl px-5 py-2.5 hover:from-pink-600 hover:to-red-600 transition shadow-md shadow-pink-200">
                🗑️ Delete
            </a>

        </div>
        {% endif %}

    </div>

</body>
</html>
