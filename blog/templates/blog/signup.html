<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #signup-form p { margin-bottom: 1.25rem; }
        #signup-form label { display: block; font-size: 0.875rem; font-weight: 600; color: #ec4899; margin-bottom: 0.375rem; }
        #signup-form input { width: 100%; border: 2px solid #fce7f3; border-radius: 0.75rem; padding: 0.625rem 1rem; font-size: 0.875rem; color: #1f2937; background: #fdf2f8; outline: none; transition: all 0.2s; box-sizing: border-box; }
        #signup-form input:focus { border-color: #f472b6; box-shadow: 0 0 0 3px rgba(244,114,182,0.2); }
        #signup-form ul { display: none; }
        #signup-form span.helptext { display: none; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-100 via-pink-50 to-orange-100 flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <p class="text-xs font-semibold uppercase tracking-widest text-pink-400 mb-1">Join us today</p>
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400">Sign up</h1>
        </div>

        <div class="bg-white border-2 border-pink-200 rounded-2xl p-8 shadow-lg shadow-pink-100">
            <form method="POST" id="signup-form">
                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="w-full text-sm font-semibold text-white bg-gradient-to-r from-pink-500 to-orange-400 py-3 rounded-xl hover:from-pink-600 hover:to-orange-500 transition shadow-md shadow-pink-200 mt-2"
                >
                    🎉 Create account
                </button>
            </form>

            <p class="text-center text-xs text-gray-400 mt-5">
                Already have an account?
                <a href="/login/" class="text-pink-500 font-semibold hover:text-violet-500 transition">Login</a>
            </p>
        </div>

        <p class="text-xs text-pink-300 text-center mt-4">🔒 CSRF protected</p>
    </div>

</body>
</html>
